{{- if eq .Values.global.userPlaneArchitecture "single" }}
{{- with .Values.upf }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "free5gc-upf.fullname" $ }}-{{ .name }}
  labels:
    {{- include "free5gc-upf.labels" $ | nindent 4 }}
    project: {{ $.Values.global.projectName }}
    nf: {{ .name }}
spec:
  {{- if not .autoscaling.enabled }}
  replicas: {{ .replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "free5gc-upf.selectorLabels" $ | nindent 6 }}
      project: {{ $.Values.global.projectName }}
      nf: {{ .name }}
  template:
    metadata:
      annotations:
        {{- include "free5gc-upf.upfAnnotations" $ | nindent 8 }}
        k8s.v1.cni.cncf.io/networks: '[
            { "name": "{{ $.Values.global.n3network.name }}-{{ include "free5gc-upf.fullname" $ }}",
              "interface": "n3",
              "ips": [ "{{ .n3if.ipAddress }}/{{ $.Values.global.n3network.cidr }}" ],
              "gateway": [ "{{ $.Values.global.n3network.gatewayIP }}" ]
            },
            { "name": "{{ $.Values.global.n6network.name }}-{{ include "free5gc-upf.fullname" $ }}",
              "interface": "n6",
              "ips": [ "{{ .n6if.ipAddress }}/{{ $.Values.global.n6network.cidr }}" ],
              "gateway": [ "{{ $.Values.global.n6network.gatewayIP }}" ]
            }
            ]'
        checksum/config: {{ include (print $.Template.BasePath "/upf/upf-configmap.yaml") $ | sha256sum }}
      labels:
        {{- include "free5gc-upf.selectorLabels" $ | nindent 8 }}
        project: {{ $.Values.global.projectName }}
        nf: {{ .name }}
    spec:
      # go-upf resolves cfg.Pfcp.NodeID to an IP at startup and refuses to start
      # if it can't ("NodeID can't be resolved"). Our nodeID is the `n4` binding
      # FQDN — resolvable in the SMF's UC (where the binding Service lives) but
      # NOT here in the UPF's UC. Pin it locally so go-upf starts; the value is
      # only used for the UPF's own (unused) F-SEID IP, while the NodeID IE still
      # carries the FQDN string for the SMF to resolve to the real binding IP
      # (so its PFCPContext lookup matches and it doesn't nil-deref).
      hostAliases:
        - ip: "127.0.0.1"
          hostnames:
            - "n4.upstream.svc.cluster.local"
      imagePullSecrets:
        {{- toYaml .imagePullSecrets | nindent 8 }}
      securityContext:
        {{- toYaml .podSecurityContext | nindent 8 }}
      containers:
      - name: {{ .name }}
        image: {{ .image.name }}:{{ .image.tag | default $.Chart.AppVersion }}
        imagePullPolicy: {{ .image.pullPolicy }}
        securityContext:
            {{- toYaml .securityContext | nindent 12 }}
        ports:
        - name: n4
          containerPort: 8805
          protocol: UDP
        command: ["{{ .volume.mount }}/wrapper.sh"]
        volumeMounts:
        - mountPath: {{ .volume.mount }}
          name: {{ include "free5gc-upf.fullname" $ }}-{{ .name }}-volume
        resources:
            {{- toYaml .resources | nindent 12 }}
      dnsPolicy: ClusterFirst
      restartPolicy: Always
      nodeSelector:
        {{- toYaml .nodeSelector | nindent 8 }}
      affinity:
        {{- toYaml .affinity | nindent 8 }}
      tolerations:
        {{- toYaml .tolerations | nindent 8 }}
      volumes:
      - name: {{ include "free5gc-upf.fullname" $ }}-{{ .name }}-volume
        projected:
          sources:
          - configMap:
              name: {{ include "free5gc-upf.fullname" $ }}-{{ .name }}-configmap
              items:
              - key: upfcfg.yaml
                path: upfcfg.yaml
              - key: wrapper.sh
                path: wrapper.sh
                mode: 0777
{{- end }}
{{- end }}
