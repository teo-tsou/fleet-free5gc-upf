{{- if eq .Values.global.userPlaneArchitecture "single" }}
apiVersion: v1
kind: Service
metadata:
  name: upf-n4
  namespace: {{ .Release.Namespace }}
  labels:
    app: {{ .Values.global.projectName }}
spec:
  type: NodePort
  selector:
    app.kubernetes.io/instance: {{ .Release.Name }}
    project: {{ .Values.global.projectName }}
    nf: {{ .Values.upf.name }}
  ports:
    - name: pfcp
      protocol: UDP
      port: 8805
      targetPort: 8805
{{- end }}
