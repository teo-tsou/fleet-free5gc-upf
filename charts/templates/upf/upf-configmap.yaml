{{- if eq .Values.global.userPlaneArchitecture "single" }}
{{- with .Values.upf }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "free5gc-upf.fullname" $ }}-{{ .name }}-configmap
  labels:
    app: {{ $.Values.global.projectName }}
data:
  upfcfg.yaml: |
    version: 1.0.3
    description: UPF initial local configuration

    # N4 (PFCP): bind on 0.0.0.0 so the NodePort can DNAT to the pod.
    #
    # nodeID MUST equal the address the SMF dials the UPF by — the `n4` binding
    # FQDN. The SMF keys its PFCPContext by ResolveNodeIdToIp(userplaneInfo UPF
    # nodeID) = ResolveNodeIdToIp(n4.upstream.svc) and then looks the Session
    # Establishment Response up by ResolveNodeIdToIp(UPF's reported nodeID). If
    # the UPF reports 0.0.0.0 those keys differ and the SMF nil-derefs
    # (datapath.go:163). Reporting the same FQDN makes both resolve to the same
    # IP in the SMF's cluster. The UPF can't resolve this name locally, so its
    # own F-SEID IPv4 is empty — harmless: the SMF uses the SEID + NodeID, and
    # the N3 data path uses the separate GTP-U F-TEID (the n3 ipvlan IP).
    pfcp:
      addr: 0.0.0.0
      nodeID: n4.upstream.svc.cluster.local
      retransTimeout: 1s
      maxRetrans: 3

    gtpu:
      forwarder: gtp5g
      ifList:
        - addr: {{ .n3if.ipAddress }}
          type: N3

    {{- toYaml .configuration | nindent 4 }}

  wrapper.sh: |
    #!/bin/sh

    ### Implement networking rules
    # UE internet egress goes out eth0 (the pod network), which has real internet
    # via the cluster/node. The N6 Multus ipvlan ({{ $.Values.global.n6network.subnetIP }}/{{ $.Values.global.n6network.cidr }})
    # is an isolated subnet with no real gateway/egress, so routing UE traffic
    # through the n6if table blackholed it (the UE could reach the UPF's own N6
    # IP but not 8.8.8.8). This matches the official non-multus UPF: NAT the UE
    # pool out eth0 and let it follow the default route. The n6 interface stays
    # attached for the upfcfg N6 reference; only the egress path changes.
    #
    # The decapsulated UE packets are *forwarded*, so forwarding must be on in
    # THIS pod netns (the gtp5g daemonset only set it on the host netns).
    sysctl -w net.ipv4.ip_forward=1 2>/dev/null || echo 1 > /proc/sys/net/ipv4/ip_forward

    # The N3/N6 Multus NADs each install a "default via <gateway>" route from
    # their IPAM gateway. The N6 one points at a non-existent gateway
    # ({{ $.Values.global.n6network.gatewayIP }}, ARP FAILED), and it wins the
    # default-route race over eth0 — so UE internet traffic was sent out n6 and
    # bounced as "host unreachable". N3/N6 only need their on-link subnet routes;
    # internet egress is eth0. Drop both bogus defaults so eth0's default wins.
    ip route del default dev n3 2>/dev/null || true
    ip route del default dev n6 2>/dev/null || true

    iptables -A FORWARD -j ACCEPT
    iptables -t nat -A POSTROUTING -s {{ $.Values.global.uesubnet }} -o eth0 -j MASQUERADE

    {{- if $.Values.upf.configmap.wrapperAdditionalCommands }}
    {{- $.Values.upf.configmap.wrapperAdditionalCommands | toYaml | indent 2 }}
    {{- end }}

    /free5gc/upf -c {{ .volume.mount }}/upfcfg.yaml   # binary is /free5gc/upf in the official image

{{- end }}
{{- end }}
